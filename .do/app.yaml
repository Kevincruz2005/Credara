name: credara
region: nyc
services:
  - name: credara-backend
    github:
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: cd backend && npm install
    run_command: cd backend && npm start
    envs:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: GRADIENT_MODEL_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GRADIENT_BASE_URL
        value: https://inference.do-ai.run/v1
      - key: TWILIO_SID
        scope: RUN_TIME
        type: SECRET
      - key: TWILIO_TOKEN
        scope: RUN_TIME
        type: SECRET
      - key: TWILIO_PHONE
        scope: RUN_TIME
        type: SECRET
      - key: DIDIT_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: FRONTEND_URL
        scope: RUN_TIME
        type: SECRET
      - key: WEBHOOK_BASE_URL
        scope: RUN_TIME
        type: SECRET
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb

  - name: credara-frontend
    github:
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: cd frontend && npm install && npm run build
    output_dir: frontend/build
    envs:
      - key: REACT_APP_API_URL
        scope: BUILD_TIME
        type: SECRET
